services:

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: uppskriftabok
      POSTGRES_USER: uppskriftabok
      POSTGRES_PASSWORD: uppskriftabok
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uppskriftabok"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/uppskriftabok
      SPRING_DATASOURCE_USERNAME: uppskriftabok
      SPRING_DATASOURCE_PASSWORD: uppskriftabok
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"

  auth-service:
    build: ./auth-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/uppskriftabok
      SPRING_DATASOURCE_USERNAME: uppskriftabok
      SPRING_DATASOURCE_PASSWORD: uppskriftabok
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_SECONDS: ${JWT_EXPIRY_SECONDS:-14400}
      REFRESH_TOKEN_EXPIRY_DAYS: ${REFRESH_TOKEN_EXPIRY_DAYS:-30}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8082"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - auth-service

volumes:
  postgres_data:
