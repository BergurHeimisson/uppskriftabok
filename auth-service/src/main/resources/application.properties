spring.datasource.url=jdbc:postgresql://localhost:5432/uppskriftabok
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.table=auth_flyway_schema_history
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

jwt.secret=${JWT_SECRET:dev-secret-change-in-production-must-be-at-least-256-bits-long}
jwt.expiry-seconds=${JWT_EXPIRY_SECONDS:14400}
jwt.refresh-expiry-days=${REFRESH_TOKEN_EXPIRY_DAYS:30}

server.port=8082
