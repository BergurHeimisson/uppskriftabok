# Rate limiting zone — 5 login attempts per minute per IP
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;

server {
    listen 80;
    server_name _;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Internal subrequest used by auth_request — never accessible directly
    location = /_auth_validate {
        internal;
        proxy_pass http://auth-service:8082/auth/validate;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Original-Method $request_method;
    }

    location @unauthorized {
        default_type application/json;
        return 401 '{"error":"Unauthorized"}';
    }

    location = / {
        return 301 /uppskriftapunktar/;
    }

    location = /uppskriftapunktar {
        return 301 /uppskriftapunktar/;
    }

    # Auth endpoints (login, logout, refresh) — rate-limited
    location /auth/ {
        limit_req zone=login_zone burst=5 nodelay;
        proxy_pass http://auth-service:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Admin UI and API — proxied to auth-service (JWT + role check handled there)
    location /admin/ {
        proxy_pass http://auth-service:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Cookbook API — auth_request gates writes; reads pass freely via X-Original-Method
    location /api/ {
        auth_request /_auth_validate;
        error_page 401 = @unauthorized;
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /uppskriftapunktar/ {
        root /usr/share/nginx/html;
        rewrite ^/uppskriftapunktar/(.*)$ /$1 break;
        try_files $uri @spa;
    }

    location @spa {
        root /usr/share/nginx/html;
        rewrite ^ /index.html break;
    }
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;
